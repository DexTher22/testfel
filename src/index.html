<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BMI index</title>
  <link rel="stylesheet" href="bootstrap.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Testtömegindex kalkulátor</h1>

    <form id="form">
      <label for="weight" class="form-label">Testtömeg</label>
      <input type="text" id="weight" class="form-control">
      <label for="height" class="form-label">Magasság</label>
      <input type="text" id="height" class="form-control">
      <button type="submit" class="btn btn-success" id="calculate">Számít</button>
      <br>
      <label for="bmiIndex">Eredmény</label>
      <input type="text" class="form-control" id="bmiIndex">
    </form>

    <table class="table table-striped">
      <thead>
        <th>Testtömegindex</th>
        <th>Testsúlyosztályozás</th>
      </thead>
      <tbody>
        <tr data-min="0" data-max="15.99">
          <td>< 16</td>
          <td>Súlyos soványság</td>
        </tr>
        <tr data-min="16" data-max="16.99">
          <td>16 - 16,99</td>
          <td>mérsékelt soványság</td>
        </tr>
        <tr data-min="17" data-max="18.49">
          <td>17 - 18,49</td>
          <td>enyhe soványság</td>
        </tr>
        <tr data-min="18.5" data-max="24.99">
          <td>18,5 - 24,99</td>
          <td>normális testsúly</td>
        </tr>
        <tr data-min="25" data-max="29.99">
          <td>25-29,99</td>
          <td>Túlsúlyos</td>
        </tr>
        <tr data-min="30" data-max="34.99">
          <td>30 - 34,99</td>
          <td>I. fokú elhízás</td>
        </tr>
        <tr data-min="35" data-max="39.99">
          <td>35 - 39,99</td>
          <td>II. fokú elhízás</td>
        </tr>
        <tr data-min="40" data-max="9999">
          <td>≥ 40</td>
          <td>III. fokú elhízás</td>
        </tr>
      </tbody>
    </table>
  </div>
  <script src="bootstrap.js"></script>
  <script src="app.js"></script>  
</body>
</html>
